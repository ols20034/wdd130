<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thomas DeSantos Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-size: auto;
      text-align: center;
    }
    .hero-image {
        width: 100%;
        height: auto;
        display: block;
    }

    .icon-bar {
      display: flex;
      justify-content: center;
      gap: 60px;
      background-color: rgb(128, 127, 127);
      padding: 30px 0;
    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                        
    
    .icon-bar img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid #474747;
    }
    
  </style>
</head>
<body> 
    <img src="images/circles.jpg" alt="top logo">
    <div class="icon-bar">
      <img src="images/desk.jpg" alt="Workspace Icon">
      <img src="images/logo-s.jpg" alt="Stylized S Logo">
      <img src="images/image_person.jpg" alt="Portrait of Thomas DeSantos">
    </div>
  </div>
</body>
</html>
