<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Feed Sign Up</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: rgb(120, 96, 64);
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        padding: 40px 0;
    }

    /* FORM CONTAINER */
    #formContainer {
        width: 600px;
        min-height: 600px;
        background: white;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        text-align: center;
        border: 6px solid darkblue;
    }

    /* TOP IMAGE SECTION */
    .topImage {
        position: relative;
        height: 250px;
        background-image: url("images/jesus_feeds_5000_small.jpg");
        background-size: cover;
        background-position: top;
    }

    /* Close button */
    #closeBtn {
        position: absolute;
        top: 10px;
        left: 10px;
        background: white;
        color: black;
        border: none;
        font-size: 20px;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
    }

    /* Overlay text */
    .titleOverlay {
        position: absolute;
        top: 75%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        text-align: center;
    }

    .titleOverlay h1 {
        font-family: "Times New Roman", serif;
        font-size: 50px;
        font-weight: bold;
        text-shadow: 3px 3px 6px black;
    }

    .titleOverlay h2 {
        font-size: 30px;
        margin-top: 10px;
        font-family: "Times New Roman", serif;
        text-shadow: 3px 3px 6px black;
    }

    /* FORM CONTENT */
    form {
    padding: 20px 40px;
    color: black;
    display: grid;
    grid-template-columns: 200px 1fr 1fr 1fr; /* LABEL LEFT, INPUT RIGHT */
    grid-row-gap: 18px;
    align-items: center;
}

    form h3 {
        grid-column: 1 / span 4                                                                 ;
        text-align: center;
        font-size: 26px;
        margin-bottom: 20px;
    }

/* LABELS ON LEFT */
    form label {
        grid-column: 1;
        text-align: right;
        font-family: "Times New Roman", serif;
        font-size: 20px;
        font-weight: bold;
        padding-right: 80px;
        display: flex;
        justify-content: left;
        align-items: center;
    }

/* INPUTS ON RIGHT */
    input[type="text"],
    input[type="password"],
    input[type="email"] {
        grid-column: 3;
        width: 250px;
        padding: 5px;
        border-radius: 6px;
        border: 1px solid #999;
        font-family: "Times New Roman", serif;
        font-size: 12px;
        justify-content: right;
    }

/* GENDER RADIO BUTTONS ON RIGHT */
    .inline-group {
        grid-column: 3;
        display: flex;
        gap: 10px;
        align-items: center;
    }

/* CHECKBOXES CENTERED UNDER GRID */
    .checkbox-row {
        grid-column: 1 / span 3;
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 10px;
    }

/* SUBMIT BUTTON CENTERED */
    button[type="submit"] {
        grid-column: 1 / span 3;
        width: 80px;
        margin: 20px auto 0 auto;
        padding: 4px;
        background: lightgrey;
        color: black;
        border: 1px solid #666;
        border-radius: 6px;
        font-family: "Times New Roman", serif;
        font-size: 18px;
        cursor: pointer;
    }


    /* BOTTOM SCRIPTURE IMAGES */
    .scriptureGrid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 5px;
        padding-top: 10px;
        background: white;
    }

    .scriptureGrid img {
        width: 100%;
        height: 150px;
        object-fit: cover;
    }
</style>
</head>

<body>

<div id="formContainer">

    <!-- TOP IMAGE -->
    <div class="topImage">
        <button type="button" id="closeBtn">X</button>

        <div class="titleOverlay">
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </div>
    </div>

    <!-- FORM -->
    <form id="myForm">
        <h3>Sign Up for Daily Scripture Feed</h3>

        <label for="username">User Name:</label>
        <input type="text" id="username" name="username" maxlength="40" required>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" maxlength="40" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" maxlength="40" required>

        <label>Gender:</label>
        <div class="inline-group">
            <input type="radio" id="male" name="gender" value="male" required>
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="female" required>
            <label for="female">Female</label>
        </div>

        <div class="checkbox-row">
            <input type="checkbox" id="newsletter" name="newsletter">
            <label for="newsletter">Subscribe to newsletter</label>
        </div>

        <div class="checkbox-row">
            <input type="checkbox" id="conditions" name="conditions" required>
            <label for="conditions">I acknowledge the terms and conditions</label>
        </div>

        <button type="submit">Submit</button>
    </form>

    <!-- BOTTOM SCRIPTURE IMAGES -->
    <div class="scriptureGrid">
        <img src="images/old_testament.jpg">
        <img src="images/new_testament.jpg">
        <img src="images/book_of_mormon.jpg">
        <img src="images/doctrine_and_covenants.jpg">
        <img src="images/pearl_of_great_price.jpg">
    </div>

</div>

<div id="output"></div>

<!-- REQUIRED JAVASCRIPT -->
<script>
    document.getElementById("closeBtn").addEventListener("click", function () {
        document.getElementById("formContainer").style.display = "none";
    });

    const form = document.getElementById('myForm');
    const output = document.getElementById('output');

    form.addEventListener('submit', function (event) {
        event.preventDefault();

        const formData = new FormData(form);
        const entries = [];

        for (const [key, value] of formData.entries()) {
            if (key == "password") {
                entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
            } else {
                entries.push(`<strong>${key}</strong>: ${value}`);
            }
        }

        output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
        `;
    });
</script>

</body>
</html>
